<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Media Gallery - Webserv</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .gallery-item {
            background: #fff;
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }
        .gallery-item img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 10px;
        }
        .video-test {
            margin-top: 40px;
            background: #333;
            color: white;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <h1>🖼️ Media Resources Gallery</h1>
        <p>Testing multiple MIME types and concurrent GET requests.</p>
    </div>

    <div class="gallery-container">
        <div class="gallery-item">
            <img src="/assets/images/background.jpg" alt="Test JPEG">
            <span>Image: background.jpg (JPEG)</span>
        </div>

        <div class="gallery-item">
            <img src="/assets/images/logo.png" alt="Test PNG">
            <span>Image: logo.png (PNG)</span>
        </div>

        <div class="gallery-item">
            <img src="/assets/images/animation.gif" alt="Test GIF">
