
server {
    listen :8080;
    listen 0.0.0.0:8081;

    root ./www/main;
    index index.html;

    client_max_body_size 10K;

    error_page 404 ./www/errors/404.html;
    error_page 403 ./www/errors/403.html;
    error_page 500 ./www/errors/500.html;


    location / {
        methods GET;
        autoindex off;
    }

    location /images {
        methods GET;
        autoindex on;
    }

    location /upload {
        methods POST;
        upload_path ./uploads;
    }

    location /delete {
        methods DELETE;
    }

    location /old {
        return 301 /new;
    }


    location /cgi-bin {
        methods GET POST;
        cgi .php /usr/bin/php-cgi;
    }
}

