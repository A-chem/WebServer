server {
    listen 8080;
    server_name localhost test_server;
    root /tmp/www;
    index index.html;
    client_max_body_size 10M;

    # 1. Default location
    location / {
        # This will look for /tmp/www/index.html
        root /tmp/www;
    }

    # 2. Images location
    location /images {
        # If someone asks for /images/cat.jpg, it looks in /tmp/pictures/cat.jpg
        root /tmp/pictures;
    }

    # 3. Autoindex test location
    location /downloads {
        root /tmp/downloads;
        autoindex on;
    }
}
