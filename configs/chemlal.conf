server {
    listen 9999;
    server_name localhost;
    root ./www;
    index index.html;
    client_max_body_size 100M;

    # Had l-location ghadi ikhdem fih l-PHP
    location /scripts {
        root ./www/scripts;
        limit_except GET POST {
            deny all;
        }
        cgi_pass .php /usr/bin/php-cgi;
        autoindex on;
    }
        location / {
        limit_except GET POST {
            deny all;
        }
        index index.html;
        autoindex on;
    }

    # Had l-location ghadi ikhdem fih l-Python
    location /cgi-bin{
        limit_except GET POST{
            deny all;
        }
        cgi_pass .py /usr/bin/python3;
        root ./www/cgi-bin;
    }

    # Error pages standard
    error_page 404 error_pages/404.html;
    error_page 500 error_pages/500.html;
}