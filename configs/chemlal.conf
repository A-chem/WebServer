server {
    listen 8080;
    client_max_body_size 1000000;
    root www/static;
    index index.html;

    # Home / Static files
    location / {
        root www/static;
        autoindex on;
    }

    # Static assets (CSS, JS, images)
    location /static/ {
        root www;
        autoindex off;
        limit_except GET {
            deny all;
        }
    }

    # Python CGI scripts
    location /cgi-bin/ {
        root www;
        limit_except GET POST {
            deny all;
        }
        cgi_pass .py /usr/bin/python3;
    }

    # PHP API
    location /api/ {
        root www;
        limit_except GET POST {
            deny all;
        }
        cgi_pass .php /usr/bin/php;
    }

    # File upload
    location /upload {
        root www;
        limit_except POST {
            deny all;
        }
        upload_store www/uploads;
    }

    # Downloads
    location /downloads/ {
        root www;
        autoindex on;
        limit_except GET {
            deny all;
        }
    }

    # Error pages
    error_page 404 /errors/404.html;
    error_page 500 /errors/500.html;
    error_page 403 /errors/403.html;
}